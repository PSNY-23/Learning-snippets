<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
   <h1>This is a same webrtc application</h1>
   <video id="video" autoplay></video>
   <button onclick="startCall()">Start Camera</button>
   <button onclick="endCall()">End camera</button>
  <script>
    const vidElm = document.getElementById("video");
    let streams ;
    const startCall = async() => {
       streams = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
      });
      vidElm.srcObject = streams;
    }
    const endCall = async() => {
      if(streams) {
        await streams.getTracks().forEach((track) => track.stop())
        vidElm.srcObject = null;  
      }
    }
  </script>
</body>
</html>
